<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">Nutri<span>Flow</span></div>
  <div>
    <a href="index.html">Home</a>
    <a href="analyser.html">Analyse</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="mealplanner.html">Meal Plan</a>
  </div>
</div>

<section class="section">

  <h1>Daily Nutrition Dashboard</h1>

  <div class="box">

    <select id="foodInput">
      <option>Big Mac</option>
      <option>Fries</option>
      <option>Chicken Burger</option>
      <option>Pizza</option>
      <option>Salad</option>
      <option>Protein Shake</option>
    </select>

    <button onclick="addFood()">Add Food</button>
    <button onclick="resetDay()">Reset Day</button>

  </div>

  <div class="stats">

    <div class="stat">
      <h3>Calories</h3>
      <p id="cal">0</p>
    </div>

    <div class="stat">
      <h3>Protein</h3>
      <p id="pro">0</p>
    </div>

    <div class="stat">
      <h3>Carbs</h3>
      <p id="carb">0</p>
    </div>

    <div class="stat">
      <h3>Fat</h3>
      <p id="fat">0</p>
    </div>

  </div>

  <h2 style="margin-top:30px;">Progress</h2>

  <p>Calories Goal</p>
  <div class="bar"><div id="calBar"></div></div>

  <p>Protein Goal</p>
  <div class="bar"><div id="proBar"></div></div>

  <h2 style="margin-top:30px;">Food Log</h2>
  <div id="log" class="card"></div>

</section>

<script src="script.js"></script>

<script>
let logList = [];

function addFood() {
  let food = document.getElementById("foodInput").value;
  let d = foods[food];

  total.cal += d.cal;
  total.pro += d.pro;
  total.carb += d.carb;
  total.fat += d.fat;

  document.getElementById("cal").innerText = total.cal;
  document.getElementById("pro").innerText = total.pro;
  document.getElementById("carb").innerText = total.carb;
  document.getElementById("fat").innerText = total.fat;

  document.getElementById("calBar").style.width = (total.cal/2000)*100 + "%";
  document.getElementById("proBar").style.width = (total.pro/120)*100 + "%";

  logList.push(food);
  document.getElementById("log").innerHTML =
    logList.map(f => `<p>• ${f}</p>`).join("");
}

function resetDay() {
  total = {cal:0, pro:0, carb:0, fat:0};
  logList = [];

  document.getElementById("cal").innerText = 0;
  document.getElementById("pro").innerText = 0;
  document.getElementById("carb").innerText = 0;
  document.getElementById("fat").innerText = 0;

  document.getElementById("calBar").style.width = "0%";
  document.getElementById("proBar").style.width = "0%";

  document.getElementById("log").innerHTML = "";
}
</script>

</body>
</html>
